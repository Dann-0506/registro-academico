spring.application.name=SIRA-Backend

# Carga de variables de entorno desde .env
spring.config.import=optional:dotenv[:]

# Base de datos
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/registro_academico}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD:}

# JPA / Hibernate
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# JWT
jwt.secret=${JWT_SECRET:sira-dev-secret-key-must-be-at-least-32-chars}
jwt.expiration-ms=${JWT_EXPIRATION_MS:604800000}

# CORS
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173}

# Propiedades individuales para herramientas nativas (pg_dump / psql)
db.host=${DB_HOST:localhost}
db.port=${DB_PORT:5432}
db.name=${DB_NAME:registro_academico}

# Límite de tamaño para subida de archivos (CSV y respaldos)
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB